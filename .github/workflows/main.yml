name: 'CI/CD Pipeline for frontend'
on:
 push:
   branches:
     - master
     - development
     - ci/cd-integration
     - staging
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Use Node.js 20.x
      uses: actions/setup-node@v2
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      run: npm install 
    - name: Build file
      run: npm run build